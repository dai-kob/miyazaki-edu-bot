<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三松中 危機管理マニュアル ボット</title>
    <style>
        :root {
            --primary: #1a365d;
            --danger: #c53030;
            --bg: #f7fafc;
            --chat-bg: #ffffff;
            --text: #2d3748;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .chat-container {
            width: 100%;
            max-width: 480px;
            height: 100vh;
            max-height: 800px;
            background: var(--chat-bg);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-header {
            background: var(--primary);
            color: white;
            padding: 15px;
            font-size: 15px;
            font-weight: bold;
            text-align: center;
            line-height: 1.4;
        }
        .chat-messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            max-width: 90%;
            padding: 12px 14px;
            border-radius: 10px;
            font-size: 13.5px;
            line-height: 1.6;
        }
        .bot-message {
            background: #edf2f7;
            color: var(--text);
            align-self: flex-start;
        }
        .user-message {
            background: var(--primary);
            color: white;
            align-self: flex-end;
        }
        .options-container {
            display: flex;
            flex-direction: column;
            gap: 6px;
            width: 100%;
        }
        .option-btn {
            background: white;
            border: 1px solid #cbd5e0;
            color: #4a5568;
            padding: 10px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            text-align: left;
            font-weight: 500;
        }
        .option-btn:hover {
            background: #f7fafc;
            border-color: var(--primary);
            color: var(--primary);
        }
        .danger-btn {
            border-color: var(--danger);
            color: var(--danger);
        }
        .danger-btn:hover {
            background: #fff5f5;
        }
        .chat-footer {
            padding: 10px;
            background: #f7fafc;
            border-top: 1px solid #e2e8f0;
            text-align: center;
        }
        .reset-btn {
            background: #718096;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
        }
        .section-title {
            font-weight: bold;
            color: var(--primary);
            border-left: 4px solid var(--primary);
            padding-left: 6px;
            margin: 10px 0 5px 0;
        }
        .alert-box {
            background: #fff5f5;
            border: 1px solid #fed7d7;
            color: #9b2c2c;
            padding: 8px;
            border-radius: 4px;
            margin: 5px 0;
            font-size: 12.5px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
            margin-top: 5px;
        }
        th, td {
            border: 1px solid #e2e8f0;
            padding: 5px;
        }
        th { background: #edf2f7; }
    </style>
</head>

    const chatMessages = document.getElementById('chatMessages');

    function initChat() {
        chatMessages.innerHTML = '';
        addBotMessage('start');
    }

    function addBotMessage(key) {
        const data = chatData[key];
        const msgDiv = document.createElement('div');
        msgDiv.className = 'message bot-message';
        msgDiv.innerHTML = data.text;
        chatMessages.appendChild(msgDiv);

        if (data.options && data.options.length > 0) {
            const optionsDiv = document.createElement('div');
            optionsDiv.className = 'options-container';
            
            data.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                if(opt.text.includes("↩️")) btn.className += " danger-btn";
                btn.innerHTML = opt.text;
                btn.onclick = () => handleUserSelection(opt.text, opt.next);
                optionsDiv.appendChild(btn);
            });
            chatMessages.appendChild(optionsDiv);
        }
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function handleUserSelection(text, nextKey) {
        const oldOptions = chatMessages.querySelectorAll('.options-container');
        oldOptions.forEach(el => el.remove());

        const msgDiv = document.createElement('div');
        msgDiv.className = 'message user-message';
        msgDiv.innerText = text.replace(/<[^>]*>/g, '');
        chatMessages.appendChild(msgDiv);

        setTimeout(() => {
            addBotMessage(nextKey);
        }, 150);
    }

    initChat();
</script>
